<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tree</title>
    <link rel="stylesheet" href="style.css">
    <!-- Tailwind CSS -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- G Fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

</head>
<body class="manrope-font">

    <header class="container max-w-[80%] mx-auto">
        <h1 class="text-5xl font-bold text-green-500 mb-4">Plant Tracker</h1>
        <div class="head-items grid grid-cols-3 gap-5">
            <div class="one bg-amber-200 p-4 rounded-md">
                <p class="font-semibold text-3xl pb-1.5 text-amber-600">0</p>
                <p class="font-semibold text-xl text-amber-600">Total</p>
            </div>
            <div class="two bg-green-200 p-4 rounded-md">
                <p class="font-semibold text-3xl pb-1.5 text-green-600">0</p>
                <p class="font-semibold text-xl text-green-600">Thriving</p>
            </div>
            <div class="three bg-red-200 p-4 rounded-md">
                <p class="font-semibold text-3xl pb-1.5 text-red-500">0</p>
                <p class="font-semibold text-xl  text-red-500">Struggling</p>
            </div>
        </div>
    </header>
    
</body>
</html>
